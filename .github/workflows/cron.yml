name: Daily Agenda Messages

on:
  schedule:
    - cron: '45 18 * * *'   # 15:45 Sao Paulo (UTC-3)
    - cron: '0 19 * * *'    # 16:00 Sao Paulo (UTC-3)
  workflow_dispatch:

jobs:
  send-morning:
    if: github.event.schedule == '45 18 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger morning message
        run: curl -X GET https://agenda-bot-susg.onrender.com/cron/morning

  send-evening:
    if: github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger evening message
        run: curl -X GET https://agenda-bot-susg.onrender.com/cron/evening
